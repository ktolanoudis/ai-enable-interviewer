services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-enable-interviewer:prod
    container_name: discovery-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
