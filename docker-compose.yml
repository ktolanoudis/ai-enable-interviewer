services:
  app:
    image: ${DISCOVERY_IMAGE:-ghcr.io/ktolanoudis/ai-enable-interviewer:latest}
    container_name: discovery-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: discovery-watchtower
    restart: unless-stopped
    environment:
      # Newer Docker daemons may reject Watchtower's older default API version.
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.44}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup --label-enable
