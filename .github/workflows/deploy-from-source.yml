name: Deploy From Source

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server host key
        run: |
          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "${PORT}" ]; then PORT="22"; fi
          ssh-keyscan -p "${PORT}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "${PORT}" ]; then PORT="22"; fi
          ssh -i ~/.ssh/id_ed25519 -p "${PORT}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && BRANCH='main' ./scripts/deploy-prod.sh"
